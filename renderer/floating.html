<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Glucose</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    overflow: hidden;
    user-select: none;
    cursor: move;
    -webkit-app-region: drag;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Microsoft JhengHei", "Microsoft YaHei", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  body { display: inline-block; }
  .wrap {
    display: inline-block;
    padding: 8px 14px;
    text-shadow:
      0 0 5px rgba(0,0,0,0.95),
      0 0 3px rgba(0,0,0,0.95),
      0 1px 2px rgba(0,0,0,0.95);
    color: #fff;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    margin: 4px;
    min-width: 130px;
    transition: background 0.3s;
    white-space: nowrap;
  }
  .wrap.has-data       { background: rgba(0,0,0,0); }
  .wrap.has-data.multi { background: rgba(0,0,0,0.18); padding: 10px 14px; }
  .wrap.needs-config {
    background: rgba(60,60,60,0.6);
    text-align: center;
    font-size: 12px;
    padding: 12px 18px;
    color: #fff;
  }

  /* per-profile row */
  .row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: center;
  }
  .row + .row { margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.18); }
  .row .name {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.9;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row .value-block {
    text-align: right;
    line-height: 1;
  }
  .row .value-line { font-weight: 700; -webkit-app-region: no-drag; cursor: pointer; }
  .row .arrow { margin-left: 4px; }
  .row .meta { font-size: 11px; opacity: 0.88; margin-top: 3px; line-height: 1.25; }

  /* status colours apply to .value-line inside .row */
  .row.in-range     .value-line { color: #6ee36b; }
  .row.in-range     .arrow      { color: #6ee36b; }
  .row.high         .value-line { color: #f5d442; }
  .row.high         .arrow      { color: #f5d442; }
  .row.urgent-high  .value-line { color: #ff5252; }
  .row.urgent-high  .arrow      { color: #ff5252; }
  .row.low          .value-line { color: #f5d442; }
  .row.low          .arrow      { color: #f5d442; }
  .row.urgent-low   .value-line { color: #ff5252; }
  .row.urgent-low   .arrow      { color: #ff5252; }
  .row.stale-warn   .value-line { color: #bbbbbb; }
  .row.stale-urgent .value-line { color: #888888; }
  .row.error        .value-line { color: #ff7070; font-size: 14px; }

  /* single-profile mode hides name, makes value bigger */
  .single .name { display: none; }
  .single .row { grid-template-columns: 1fr; text-align: right; }

  .menu-btn {
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    text-align: center;
    line-height: 14px;
    border-radius: 3px;
    -webkit-app-region: no-drag;
    cursor: pointer;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
</style>
</head>
<body>
  <div id="menuBtn" class="menu-btn" title="Settings">⚙</div>
  <div id="container" class="wrap needs-config">
    <div id="empty-msg">loading...</div>
  </div>
<script>
  const container = document.getElementById('container');
  const menuBtn = document.getElementById('menuBtn');
  let bundle = {};
  let fontSize = 28;

  function fmt(key, params) {
    let s = bundle[key] || key;
    if (params) s = s.replace(/\{(\w+)\}/g, (_, k) => (params[k] !== undefined ? params[k] : `{${k}}`));
    return s;
  }
  function ageText(n) {
    if (n <= 0) return fmt('floating.justNow');
    if (n === 1) return fmt('floating.minuteAgo', { n });
    return fmt('floating.minutesAgo', { n });
  }

  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    window.api.openSettings();
  });

  // Sound alarms — frequency bumped per profile index so user can hear which
  // person is alarming. Octave-like spacing (semitone-ish jumps).
  let audioCtx = null;
  const HIGH_TONES = [880, 988, 1109, 1245, 1397]; // A5, B5, C#6, D#6, F6
  const LOW_TONES  = [440, 494,  554,  622,  698];
  function playBeeps(freq, count, duration = 0.2, gap = 0.12) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      for (let i = 0; i < count; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const start = now + i * (duration + gap);
        gain.gain.setValueAtTime(0.001, start);
        gain.gain.exponentialRampToValueAtTime(0.35, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
        osc.start(start);
        osc.stop(start + duration + 0.05);
      }
    } catch (e) { console.error('Beep failed:', e); }
  }
  window.api.onPlayAlarm((data) => {
    const idx = (data.profileIndex || 0) % HIGH_TONES.length;
    if (data.status === 'urgent-low') playBeeps(LOW_TONES[idx], 4, 0.2, 0.1);
    else playBeeps(HIGH_TONES[idx], 3, 0.18, 0.12);
  });

  function renderRow(p, isOnly) {
    const tr = document.createElement('div');
    tr.className = 'row';
    if (p.error) {
      tr.classList.add('error');
      tr.innerHTML = `
        <div class="name">${p.name || ''}</div>
        <div class="value-block">
          <div class="value-line">ERR</div>
          <div class="meta">${(p.error || '').slice(0, 32)}</div>
        </div>`;
    } else {
      tr.classList.add(p.status || 'in-range');
      const sizePx = isOnly ? fontSize : Math.max(18, Math.round(fontSize * 0.7));
      tr.innerHTML = `
        <div class="name">${p.name || ''}</div>
        <div class="value-block">
          <div class="value-line" style="font-size:${sizePx}px;">
            <span>${p.value}</span><span class="arrow">${p.arrow || ''}</span>
          </div>
          <div class="meta">${p.delta} mg/dL · ${ageText(p.ageMin)}</div>
        </div>`;
    }
    tr.querySelector('.value-line').addEventListener('click', (e) => {
      e.stopPropagation();
      window.api.openTrend();
    });
    return tr;
  }

  function render(data) {
    fontSize = data.fontSize || 28;
    const list = data.profiles || [];
    if (list.length === 0 || data.needsSetup) {
      container.className = 'wrap needs-config';
      container.innerHTML = `<div>${fmt('floating.needsSetup')}</div>`;
      window.api.reportContentSize({ width: container.offsetWidth + 8, height: container.offsetHeight + 8 });
      return;
    }
    const isSingle = list.length === 1;
    container.className = 'wrap has-data' + (isSingle ? ' single' : ' multi');
    container.innerHTML = '';
    list.forEach(p => container.appendChild(renderRow(p, isSingle)));
  }

  window.api.onGlucoseUpdateAll((data) => {
    render(data);
  });

  // Notify main of rendered size so window can resize to fit
  let lastReported = { w: 0, h: 0 };
  function reportSize() {
    const w = container.offsetWidth + 8;
    const h = container.offsetHeight + 8;
    if (Math.abs(w - lastReported.w) < 4 && Math.abs(h - lastReported.h) < 4) return;
    lastReported = { w, h };
    window.api.reportContentSize({ width: w, height: h });
  }
  new ResizeObserver(() => reportSize()).observe(container);

  function applyStaticI18n() {
    menuBtn.title = fmt('floating.settingsTooltip');
    const empty = document.getElementById('empty-msg');
    if (empty) empty.textContent = fmt('floating.loading');
  }

  window.api.onLanguageChanged((data) => {
    bundle = data.bundle;
    applyStaticI18n();
  });

  (async () => {
    const i = await window.api.getI18n();
    bundle = i.bundle;
    applyStaticI18n();
    reportSize();
  })();
</script>
</body>
</html>
