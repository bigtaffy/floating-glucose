<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Glucose Settings</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Microsoft JhengHei", "Microsoft YaHei", Roboto, Arial, sans-serif;
    font-size: 13px;
    padding: 18px;
    background: #f6f6f6;
    color: #222;
  }
  fieldset {
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    margin-bottom: 14px;
    padding: 10px 14px 14px;
    background: #fff;
  }
  legend { font-weight: 600; padding: 0 6px; color: #2a7a2a; }
  label { display: block; margin: 8px 0 4px; }
  input[type=text], input[type=password], input[type=number], select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #c0c0c0;
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 13px;
  }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .inline { display: flex; gap: 16px; align-items: center; margin-top: 6px; }
  .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
  button {
    padding: 8px 16px;
    border: 1px solid #b0b0b0;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  button.primary { background: #2a7a2a; color: #fff; border-color: #2a7a2a; }
  button.danger  { background: #fff; color: #b03030; border-color: #d8a8a8; }
  button.small   { padding: 4px 10px; font-size: 12px; }
  button:hover { filter: brightness(0.95); }
  .status { margin-top: 8px; font-size: 12px; min-height: 16px; }
  .status.ok { color: #2a7a2a; }
  .status.err { color: #b03030; }
  .hint { color: #777; font-size: 11px; margin-top: 2px; }

  /* ===== Profile list ===== */
  .profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .profile-item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    background: #fafafa;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
  }
  .profile-item.editing {
    grid-template-columns: 1fr;
    background: #fff;
    border-color: #2a7a2a;
    border-width: 2px;
  }
  .profile-item.disabled {
    background: #f0f0f0;
    border-left: 4px solid #b85050;
    opacity: 0.75;
  }
  .profile-item.disabled .profile-color-dot { filter: grayscale(1); }
  .profile-item.disabled .profile-name {
    text-decoration: line-through;
    color: #888;
  }
  .profile-item.disabled .profile-name::after {
    content: ' · 已停用';
    color: #b85050;
    font-weight: 700;
    font-size: 11px;
    text-decoration: none;
  }
  .profile-color-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .profile-summary { display: flex; flex-direction: column; min-width: 0; }
  .profile-name { font-weight: 600; }
  .profile-meta { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-item button { font-size: 12px; padding: 5px 10px; }
  .add-profile {
    background: #fff;
    border: 1px dashed #2a7a2a;
    color: #2a7a2a;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    font-weight: 600;
  }
  .add-profile:hover { background: #f0f8f0; }

  /* ===== Inline editor ===== */
  .editor h4 { margin: 0 0 10px; color: #2a7a2a; font-size: 14px; }
  .editor-actions { display: flex; gap: 8px; justify-content: space-between; margin-top: 10px; }
  .editor-actions .left  { display: flex; gap: 8px; }
  .editor-actions .right { display: flex; gap: 8px; }
</style>
</head>
<body>

  <fieldset>
    <legend data-i18n="settings.languageSection">Language</legend>
    <label data-i18n="settings.languageLabel">Interface language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="zh-TW">繁體中文</option>
      <option value="zh-CN">简体中文</option>
      <option value="ja">日本語</option>
    </select>
  </fieldset>

  <!-- ===== Profiles ===== -->
  <fieldset>
    <legend data-i18n="settings.profilesSection">Profiles</legend>
    <div id="profile-list" class="profile-list"></div>
    <button id="add-profile-btn" class="add-profile" type="button">
      <span data-i18n="settings.addProfile">+ Add profile</span>
    </button>
  </fieldset>

  <!-- ===== Shared display settings ===== -->
  <fieldset>
    <legend data-i18n="settings.displaySection">Display</legend>
    <div class="inline">
      <label style="margin:0;"><input type="radio" name="units" value="mg/dL" /> <span data-i18n="settings.unitsMgdl">mg/dL</span></label>
      <label style="margin:0;"><input type="radio" name="units" value="mmol/L" /> <span data-i18n="settings.unitsMmol">mmol/L</span></label>
    </div>
    <div class="row">
      <div>
        <label data-i18n="settings.fontSize">Font size (px)</label>
        <input type="number" id="fontSize" min="12" max="96" />
      </div>
      <div>
        <label data-i18n="settings.refreshSec">Refresh (seconds)</label>
        <input type="number" id="refreshSec" min="15" max="600" />
      </div>
    </div>
    <label style="margin-top:10px;"><input type="checkbox" id="showFloating" /> <span data-i18n="settings.showFloating">Show floating widget on desktop</span></label>
    <label><input type="checkbox" id="showInMenuBar" /> <span data-i18n="settings.showInMenuBar">Show value in menu bar (macOS only)</span></label>
    <label><input type="checkbox" id="hideDock" /> <span data-i18n="settings.hideDock">Hide Dock icon (macOS only)</span></label>
    <label><input type="checkbox" id="showTrayValue" /> <span data-i18n="settings.showTrayValue">Show value in system tray icon (Windows only)</span></label>
  </fieldset>

  <fieldset>
    <legend data-i18n="settings.alertsSection">Alerts</legend>
    <label><input type="checkbox" id="enableSoundAlarms" /> <span data-i18n="settings.enableSoundAlarms">Play sound when urgent high/low</span></label>
    <label><input type="checkbox" id="enableStaleNotification" /> <span data-i18n="settings.enableStaleNotification">System notification on urgent / CGM disconnect</span></label>
    <label data-i18n="settings.trendHours">Trend chart hours</label>
    <input type="number" id="trendHours" min="1" max="24" style="width:120px;" />
  </fieldset>

  <fieldset>
    <legend data-i18n="settings.proxySection">Network / Proxy</legend>
    <label data-i18n="settings.proxyUrlLabel">HTTP/HTTPS Proxy</label>
    <input type="text" id="proxyUrl" data-i18n-placeholder="settings.proxyUrlPlaceholder" placeholder="(leave blank to use system proxy)" />
    <div class="hint" data-i18n="settings.proxyUrlHint">Empty = auto-detect from system settings. Type 'direct' to bypass proxy. Or specify e.g. http://proxy.company.com:8080</div>
  </fieldset>

  <div class="status" id="status"></div>
  <div class="actions">
    <button id="saveBtn" class="primary" type="button" data-i18n="settings.saveBtn">Save</button>
  </div>

<script>
  let bundle = {};
  let config = null;            // full config object held in memory
  let editingId = null;         // currently expanded profile id

  function fmt(key, params) {
    let s = bundle[key] || key;
    if (params) s = s.replace(/\{(\w+)\}/g, (_, k) => (params[k] !== undefined ? params[k] : `{${k}}`));
    return s;
  }
  function applyI18n() {
    document.title = fmt('settings.title');
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = fmt(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = fmt(el.getAttribute('data-i18n-placeholder'));
    });
  }

  const status = document.getElementById('status');
  function setStatus(msg, cls) {
    status.textContent = msg || '';
    status.className = 'status ' + (cls || '');
  }

  /* ===== Profile list rendering ===== */
  const profileList = document.getElementById('profile-list');

  function renderProfileList() {
    profileList.innerHTML = '';
    if (!config.profiles || config.profiles.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'hint';
      empty.style.padding = '20px';
      empty.style.textAlign = 'center';
      empty.textContent = fmt('settings.noProfiles');
      profileList.appendChild(empty);
      return;
    }
    config.profiles.forEach(p => {
      const item = document.createElement('div');
      item.className = 'profile-item';
      if (editingId === p.id) {
        item.classList.add('editing');
        item.innerHTML = renderEditor(p);
        wireEditor(item, p);
      } else {
        if (!p.enabled) item.classList.add('disabled');
        item.innerHTML = renderSummary(p);
        item.querySelector('[data-act="edit"]').addEventListener('click', () => {
          editingId = p.id;
          renderProfileList();
        });
        item.querySelector('[data-act="toggle"]').addEventListener('click', () => {
          p.enabled = !p.enabled;
          renderProfileList();
        });
      }
      profileList.appendChild(item);
    });
  }

  function renderSummary(p) {
    const meta = p.nsUrl
      ? new URL(p.nsUrl).hostname + (p.token ? ' · 🔑' : '')
      : fmt('settings.noUrl');
    const enabledBtn = p.enabled ? fmt('settings.disable') : fmt('settings.enable');
    return `
      <span class="profile-color-dot" style="background:${p.color || '#6ee36b'};"></span>
      <div class="profile-summary">
        <div class="profile-name">${escapeHtml(p.name || fmt('settings.unnamed'))}</div>
        <div class="profile-meta">${escapeHtml(meta)}</div>
      </div>
      <button class="small" data-act="toggle">${enabledBtn}</button>
      <button class="small" data-act="edit">${fmt('settings.edit')}</button>
    `;
  }

  function renderEditor(p) {
    return `
      <div class="editor">
        <h4>${fmt('settings.editingProfile')}</h4>
        <label>${fmt('settings.profileName')}</label>
        <input type="text" data-field="name" value="${escapeAttr(p.name)}" placeholder="${fmt('settings.profileNamePlaceholder')}" />

        <label>${fmt('settings.urlLabel')}</label>
        <input type="text" data-field="nsUrl" value="${escapeAttr(p.nsUrl)}" placeholder="${fmt('settings.urlPlaceholder')}" />

        <label>${fmt('settings.tokenLabel')}</label>
        <input type="password" data-field="token" value="${escapeAttr(p.token)}" placeholder="${fmt('settings.tokenPlaceholder')}" />

        <div class="row" style="margin-top:10px;">
          <div><label>${fmt('settings.urgentHigh')}</label><input type="number" data-field="urgentHigh" value="${p.urgentHigh}" /></div>
          <div><label>${fmt('settings.high')}</label><input type="number" data-field="high" value="${p.high}" /></div>
          <div><label>${fmt('settings.low')}</label><input type="number" data-field="low" value="${p.low}" /></div>
          <div><label>${fmt('settings.urgentLow')}</label><input type="number" data-field="urgentLow" value="${p.urgentLow}" /></div>
        </div>
        <div class="row">
          <div><label>${fmt('settings.staleWarn')}</label><input type="number" data-field="staleWarn" value="${p.staleWarn}" /></div>
          <div><label>${fmt('settings.staleUrgent')}</label><input type="number" data-field="staleUrgent" value="${p.staleUrgent}" /></div>
        </div>

        <div class="editor-actions">
          <div class="left">
            <button class="danger" data-act="delete">${fmt('settings.delete')}</button>
          </div>
          <div class="right">
            <button data-act="test">${fmt('settings.testBtn')}</button>
            <button class="primary" data-act="done">${fmt('settings.done')}</button>
          </div>
        </div>
        <div class="status" data-editor-status></div>
      </div>
    `;
  }

  function wireEditor(item, p) {
    item.querySelectorAll('[data-field]').forEach(inp => {
      inp.addEventListener('input', () => {
        const key = inp.getAttribute('data-field');
        p[key] = inp.type === 'number' ? Number(inp.value) : inp.value;
      });
    });

    item.querySelector('[data-act="done"]').addEventListener('click', () => {
      editingId = null;
      renderProfileList();
    });

    item.querySelector('[data-act="test"]').addEventListener('click', async () => {
      const editorStatus = item.querySelector('[data-editor-status]');
      editorStatus.textContent = fmt('settings.testing');
      editorStatus.className = 'status';
      const r = await window.api.testProfile(p);
      if (r.ok) {
        editorStatus.textContent = fmt('settings.testOk', { sgv: r.sample.sgv, direction: r.sample.direction });
        editorStatus.className = 'status ok';
      } else {
        editorStatus.textContent = fmt('settings.testFail', { error: r.error });
        editorStatus.className = 'status err';
      }
    });

    item.querySelector('[data-act="delete"]').addEventListener('click', () => {
      if (!confirm(fmt('settings.deleteConfirm', { name: p.name || fmt('settings.unnamed') }))) return;
      config.profiles = config.profiles.filter(x => x.id !== p.id);
      editingId = null;
      renderProfileList();
    });
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  document.getElementById('add-profile-btn').addEventListener('click', async () => {
    const fresh = await window.api.newProfile();
    config.profiles = config.profiles || [];
    config.profiles.push(fresh);
    editingId = fresh.id;
    renderProfileList();
  });

  /* ===== Shared form fields ===== */
  const sharedNumericIds = ['fontSize','refreshSec','trendHours'];
  const sharedBoolIds = ['showFloating','showInMenuBar','hideDock','showTrayValue','enableSoundAlarms','enableStaleNotification'];
  const sharedTextIds = ['proxyUrl'];
  const languageSelect = document.getElementById('language');

  function readSharedIntoConfig() {
    for (const id of sharedNumericIds) {
      const el = document.getElementById(id);
      if (el) config[id] = Number(el.value);
    }
    for (const id of sharedBoolIds) {
      const el = document.getElementById(id);
      if (el) config[id] = el.checked;
    }
    for (const id of sharedTextIds) {
      const el = document.getElementById(id);
      if (el) config[id] = el.value.trim();
    }
    config.units = document.querySelector('input[name=units]:checked')?.value || 'mg/dL';
    config.language = languageSelect.value;
  }

  function populateShared() {
    for (const id of sharedNumericIds) {
      const el = document.getElementById(id);
      if (el && config[id] !== undefined && config[id] !== null) el.value = config[id];
    }
    for (const id of sharedBoolIds) {
      const el = document.getElementById(id);
      if (el) el.checked = !!config[id];
    }
    for (const id of sharedTextIds) {
      const el = document.getElementById(id);
      if (el && config[id] !== undefined && config[id] !== null) el.value = config[id];
    }
    const unitsRadio = document.querySelector(`input[name=units][value="${config.units}"]`);
    if (unitsRadio) unitsRadio.checked = true;
    languageSelect.value = config.language || 'en';
  }

  languageSelect.addEventListener('change', async () => {
    await window.api.setLanguage(languageSelect.value);
  });

  /* ===== Save ===== */
  document.getElementById('saveBtn').addEventListener('click', async () => {
    readSharedIntoConfig();
    await window.api.saveConfig(config);
    setStatus(fmt('settings.saved'), 'ok');
    setTimeout(() => window.close(), 400);
  });

  /* ===== Init ===== */
  window.api.onLanguageChanged((data) => {
    bundle = data.bundle;
    languageSelect.value = data.lang;
    applyI18n();
    renderProfileList();
  });

  (async () => {
    const i = await window.api.getI18n();
    bundle = i.bundle;
    applyI18n();
    config = await window.api.getConfig();
    populateShared();
    renderProfileList();
  })();
</script>
</body>
</html>
