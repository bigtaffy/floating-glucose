name: ✨ 功能建議 / Feature request
description: 提出新功能或改進想法 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到什麼困擾 / What problem are you trying to solve
      description: 先描述問題，再提解法 — 我們可能會想到不同方案
      placeholder: |
        例：晚上睡覺時手機聲音會吵到家人，希望電腦旁邊有桌面警示聲。
        Example: My phone alarm wakes up family at night; I want desktop alarm sounds on my computer instead.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你希望的解法 / Your suggested solution
      placeholder: |
        例：在設定畫面加 checkbox「啟用聲音警報」，緊急高/低血糖時播放系統提示音。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 其他可能的做法 / Alternatives considered

  - type: dropdown
    id: priority
    attributes:
      label: 對你的重要程度 / How important is this to you
      options:
        - 沒有也沒關係，只是想到
        - 有的話會更方便
        - 沒有的話我用得很卡
        - 沒這功能我就無法用
